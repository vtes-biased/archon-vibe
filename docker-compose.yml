services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: archon
      POSTGRES_USER: archon
      POSTGRES_PASSWORD: archon_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U archon" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://archon:archon_dev_password@db:5432/archon
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend Web App
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

  # Test services
  populate-db:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://archon:archon_dev_password@db:5432/archon
      VEKN_SYNC_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
    command: [ "sh", "-c", "uv sync --frozen --all-extras && uv run python backend/scripts/populate_test_db.py" ]
    profiles:
      - test

  frontend-test:
    build:
      context: .
      dockerfile: frontend/Dockerfile.test
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      populate-db:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    volumes:
      # Reports go to root level (../ from frontend working dir in container)
      - ./playwright-report:/playwright-report
      - ./test-results:/test-results
    profiles:
      - test

volumes:
  postgres_data:



<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <meta name="theme-color" content="#DC143C" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="VEKN Tournament Management - Offline-first PWA" />
    <title>Archon</title>
    <script>
      // Anti-FOUC: apply theme class and meta theme-color before first paint
      (function() {
        var t = localStorage.getItem('theme');
        var light = t === 'light' || (t !== 'dark' && matchMedia('(prefers-color-scheme: light)').matches);
        if (light) document.documentElement.classList.add('light');
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', light ? '#A40F2D' : '#DC143C');
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
